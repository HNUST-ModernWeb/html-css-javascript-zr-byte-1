<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息卡片</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
            pointer-events: none;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.8rem;
            font-weight: 700;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            letter-spacing: 3px;
        }

        .card-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.15), 
                        0 15px 40px rgba(0, 0, 0, 0.1),
                        inset 0 1px 0 rgba(255, 255, 255, 0.6);
            padding: 70px 60px;
            max-width: 700px;
            width: 100%;
            position: relative;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .card-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c);
            border-radius: 40px 40px 0 0;
        }

        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 50px;
            position: relative;
        }

        .avatar-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid white;
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 2;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .avatar:hover {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 0 25px 60px rgba(102, 126, 234, 0.4);
        }

        .avatar-upload {
            display: none;
        }

        .avatar-upload-label {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            border: 4px solid white;
            font-size: 22px;
            z-index: 3;
        }

        .avatar-upload-label:hover {
            transform: scale(1.1) rotate(-10deg);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .avatar-upload-label:active {
            transform: scale(0.95);
        }

        .user-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            color: #2d6a4f;
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 15px;
        }

        .user-status::before {
            content: '';
            width: 10px;
            height: 10px;
            background: #2d6a4f;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .info-section {
            margin-bottom: 35px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .info-item {
            margin-bottom: 0;
        }

        .info-item.full-width {
            grid-column: 1 / -1;
        }

        .info-label {
            display: block;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-input {
            width: 100%;
            padding: 18px 22px;
            border: 2px solid #e8ecf4;
            border-radius: 16px;
            font-size: 1.1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #f8fafc;
            color: #2d3748;
        }

        .info-input::placeholder {
            color: #a0aec0;
        }

        .info-input:disabled {
            background: #f1f5f9;
            color: #64748b;
            border-color: #e2e8f0;
            cursor: not-allowed;
        }

        .info-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 5px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .info-input:hover:not(:disabled) {
            border-color: #667eea;
        }

        textarea.info-input {
            min-height: 120px;
            resize: vertical;
            line-height: 1.7;
        }

        .button-group {
            display: flex;
            gap: 20px;
            margin-top: 35px;
        }

        .btn {
            flex: 1;
            padding: 18px 32px;
            border: none;
            border-radius: 16px;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #64748b;
            border: 2px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            color: #475569;
        }

        .btn-secondary.hide {
            display: none;
        }

        .save-btn {
            display: none;
        }

        .save-btn.show {
            display: flex;
        }

        .edit-btn.hide {
            display: none;
        }

        .success-message {
            display: none;
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            color: #2d6a4f;
            padding: 18px 28px;
            border-radius: 16px;
            text-align: center;
            margin-top: 25px;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 6px 20px rgba(150, 230, 161, 0.3);
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .success-message.show {
            display: block;
        }

        .success-message::before {
            content: '✓ ';
            font-weight: bold;
            margin-right: 6px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 装饰性元素 */
        .decoration-circle {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            pointer-events: none;
        }

        .decoration-1 {
            width: 400px;
            height: 400px;
            top: -200px;
            right: -200px;
        }

        .decoration-2 {
            width: 300px;
            height: 300px;
            bottom: -150px;
            left: -150px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }

            .card-container {
                padding: 50px 35px;
                border-radius: 30px;
            }

            .avatar {
                width: 150px;
                height: 150px;
            }

            .avatar-upload-label {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }

            .info-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .info-input {
                padding: 16px 18px;
                font-size: 1rem;
            }

            .button-group {
                flex-direction: column;
                gap: 15px;
            }

            .btn {
                width: 100%;
                padding: 16px 24px;
            }
        }

        .info-item {
            position: relative;
        }

        .edit-indicator {
            position: absolute;
            top: 42px;
            right: 16px;
            color: #667eea;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .info-input:not(:disabled) ~ .edit-indicator {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="decoration-circle decoration-1"></div>
    <div class="decoration-circle decoration-2"></div>
    
    <h1>个人信息卡片</h1>
    
    <div class="card-container">
        <div class="avatar-section">
            <div class="avatar-wrapper">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&gender=female&backgroundColor=b6e3f4" alt="个人头像" class="avatar" id="avatar">
                <input type="file" id="avatar-upload" accept="image/*" class="avatar-upload">
                <label for="avatar-upload" class="avatar-upload-label">📷</label>
            </div>
            <span class="user-status">在线</span>
        </div>

        <div class="info-section">
            <div class="info-grid">
                <div class="info-item">
                    <label class="info-label">姓名</label>
                    <input type="text" class="info-input" id="name-input" placeholder="请输入您的姓名" value="李小花" disabled>
                    <span class="edit-indicator">✎</span>
                </div>

                <div class="info-item">
                    <label class="info-label">职位</label>
                    <input type="text" class="info-input" id="title-input" placeholder="请输入您的职位" value="UI设计师" disabled>
                    <span class="edit-indicator">✎</span>
                </div>

                <div class="info-item">
                    <label class="info-label">邮箱</label>
                    <input type="email" class="info-input" id="email-input" placeholder="请输入您的邮箱" value="lixiaohua@example.com" disabled>
                    <span class="edit-indicator">✎</span>
                </div>

                <div class="info-item">
                    <label class="info-label">电话</label>
                    <input type="tel" class="info-input" id="phone-input" placeholder="请输入您的电话" value="138-8888-8888" disabled>
                    <span class="edit-indicator">✎</span>
                </div>

                <div class="info-item full-width">
                    <label class="info-label">个人简介</label>
                    <textarea class="info-input" id="bio-input" placeholder="请输入您的个人简介" disabled>热爱设计与艺术，专注于创造美观且实用的用户界面。擅长色彩搭配和交互设计，致力于让每一次点击都充满愉悦感。🎨✨</textarea>
                    <span class="edit-indicator" style="top: 48px;">✎</span>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn btn-secondary edit-btn" id="edit-button">
                <span>✎</span> 编辑信息
            </button>
            <button class="btn btn-primary save-btn" id="save-button">
                <span>💾</span> 保存修改
            </button>
        </div>
        
        <div class="success-message" id="success-message">信息已保存成功！</div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const avatarUpload = document.getElementById('avatar-upload');
        const avatar = document.getElementById('avatar');
        const nameInput = document.getElementById('name-input');
        const titleInput = document.getElementById('title-input');
        const emailInput = document.getElementById('email-input');
        const phoneInput = document.getElementById('phone-input');
        const bioInput = document.getElementById('bio-input');
        const editButton = document.getElementById('edit-button');
        const saveButton = document.getElementById('save-button');
        const successMessage = document.getElementById('success-message');

        const inputs = [nameInput, titleInput, emailInput, phoneInput, bioInput];

        function loadData() {
            const savedAvatar = localStorage.getItem('cardAvatar');
            const savedName = localStorage.getItem('cardName');
            const savedTitle = localStorage.getItem('cardTitle');
            const savedEmail = localStorage.getItem('cardEmail');
            const savedPhone = localStorage.getItem('cardPhone');
            const savedBio = localStorage.getItem('cardBio');

            if (savedAvatar) avatar.src = savedAvatar;
            if (savedName) nameInput.value = savedName;
            if (savedTitle) titleInput.value = savedTitle;
            if (savedEmail) emailInput.value = savedEmail;
            if (savedPhone) phoneInput.value = savedPhone;
            if (savedBio) bioInput.value = savedBio;
        }

        function saveData() {
            localStorage.setItem('cardName', nameInput.value);
            localStorage.setItem('cardTitle', titleInput.value);
            localStorage.setItem('cardEmail', emailInput.value);
            localStorage.setItem('cardPhone', phoneInput.value);
            localStorage.setItem('cardBio', bioInput.value);
        }

        function showSuccessMessage() {
            successMessage.classList.add('show');
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 2500);
        }

        function enableInputs() {
            inputs.forEach(input => input.disabled = false);
            editButton.classList.add('hide');
            saveButton.classList.add('show');
            // 开启编辑时允许上传头像
            avatarUpload.disabled = false;
            nameInput.focus();
        }

        function disableInputs() {
            inputs.forEach(input => input.disabled = true);
            editButton.classList.remove('hide');
            saveButton.classList.remove('show');
            // 修复：永远不要禁用头像上传
            // avatarUpload.disabled = true; 这行删掉！
        }

        // 头像上传逻辑（保持不变）
        avatarUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    avatar.src = e.target.result;
                    localStorage.setItem('cardAvatar', e.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        editButton.addEventListener('click', enableInputs);

        saveButton.addEventListener('click', function() {
            saveData();
            showSuccessMessage();
            disableInputs();
        });

        loadData();
        disableInputs();
    });
</script>
</body>
</html>
